<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>

  <!-- Inner rounded square -->
  <rect x="40" y="40" width="432" height="432" rx="60" fill="#2d2d2d"/>

  <!-- Stylized vector path symbol -->
  <path d="M160 340 L256 140 L352 340" stroke="#4a9eff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bezier handle dots -->
  <circle cx="160" cy="340" r="24" fill="#4a9eff"/>
  <circle cx="256" cy="140" r="24" fill="#4a9eff"/>
  <circle cx="352" cy="340" r="24" fill="#4a9eff"/>

  <!-- Small accent line -->
  <line x1="180" y1="380" x2="332" y2="380" stroke="#4a9eff" stroke-width="16" stroke-linecap="round"/>
</svg>
